# The name of the currency
name:
  singular: Dollar
  plural: Dollars

# How should the currency be formatted?
# Uses Java's DecimalFormat pattern: https://www.baeldung.com/java-decimalformat
format: $#,##0.0

# Economy Messages
messages:
  balance: "{prefix}<#F0E68C>{player}'s Balance: {balance}"
  not-enough-money: "{prefix}<red>You do not have {amount}!"
  target-not-enough-money: "{prefix}<red>{player} does not have {amount}."
  pay:
    send: "{prefix}<#F0E68C>You have sent {amount} to {target}."
    receive: "{prefix}<#F0E68C>You have been sent {amount} from {player}."
  money:
    set:
      success: "{prefix}<#F0E68C>Set {player}'s balance to {amount}."
    add:
      success: "{prefix}<#F0E68C>Added {amount} to {player}'s balance."
    take:
      success: "{prefix}<#F0E68C>Taken {amount} from {player}'s balance."
    transfer:
      success: "{prefix}<#F0E68C>Transferred {amount} from {player} to {target}."